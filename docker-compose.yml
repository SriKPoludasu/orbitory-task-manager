services:
  postgres:
    image: postgres:16-alpine
    container_name: cloud-task-manager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: task_admin
      POSTGRES_PASSWORD: task_password
      POSTGRES_DB: cloud_task_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
